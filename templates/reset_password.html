<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Virtuole</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Open+Sans:wght@400;600&display=swap');
        
        body { 
            font-family: 'Open Sans', sans-serif; 
            background: linear-gradient(135deg, #0b1a30 0%, #1a365d 50%, #0b1a30 100%); 
            color: white; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }

        .auth-container { 
            width: 100%; 
            max-width: 450px; 
            background: rgba(26, 32, 44, 0.55); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            border-top: 4px solid #38b2ac; 
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box; 
            text-align: center; 
        }

        .logo-text { font-family: 'Montserrat', sans-serif; font-size: 2.2em; font-weight: 800; color: #ffffff; letter-spacing: 2px; margin-bottom: 10px; }
        .logo-text span { color: #38b2ac; }
        
        p.subtitle { color: #a0aec0; font-size: 0.95em; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; text-align: left; position: relative; }
        label { display: block; color: #a0aec0; font-size: 0.9em; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #4a5568; background: #2d3748; color: white; box-sizing: border-box; }
        input:focus { outline: none; border-color: #38b2ac; }
        
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 12px; top: 12px; cursor: pointer; font-size: 1.1em; user-select: none; opacity: 0.7; transition: 0.2s; }
        .toggle-password:hover { opacity: 1; }
        
        .submit-btn { background: #38b2ac; color: white; font-weight: bold; font-size: 1.1em; padding: 14px 40px; border: none; border-radius: 50px; cursor: pointer; width: max-content; min-width: 200px; margin: 20px auto 10px auto; display: block; text-transform: uppercase; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(56, 178, 172, 0.3); }
        .submit-btn:hover { background: #2c7a7b; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56, 178, 172, 0.4); }

        .alert-error { background: rgba(245, 101, 101, 0.1); border-left: 4px solid #f56565; color: #f56565; padding: 12px; margin-bottom: 20px; font-size: 0.9em; text-align: left; display: none; }
        
        {% if error %}
        .alert-error.server { display: block; }
        {% endif %}
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="/" style="text-decoration: none;"><div class="logo-text">VIRTU<span>OLE</span></div></a>
        <p class="subtitle">Secure Password Recovery</p>

        <div class="alert-error server" id="error-msg">⚠️ {{ error }}</div>

        <form id="reset-form" action="/update-password" method="POST">
            <!-- Hidden inputs to securely pass the Supabase tokens to Python -->
            <input type="hidden" name="access_token" id="access_token">
            <input type="hidden" name="refresh_token" id="refresh_token">

            <div class="form-group">
                <label>New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                    <span class="toggle-password" onclick="togglePassword('password', this)">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="••••••••" required>
                    <span class="toggle-password" onclick="togglePassword('confirm_password', this)">👁️</span>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="action-btn">Update Password</button>
        </form>
    </div>

    <script>
        // Extract secure Supabase tokens from the URL Hash
        window.onload = function() {
            if (window.location.hash) {
                // Supabase puts tokens in the hash: #access_token=123&refresh_token=456
                const hash = window.location.hash.substring(1);
                const params = new URLSearchParams(hash);
                
                const accessToken = params.get('access_token');
                const refreshToken = params.get('refresh_token');

                if (accessToken && refreshToken) {
                    document.getElementById('access_token').value = accessToken;
                    document.getElementById('refresh_token').value = refreshToken;
                } else {
                    showError("Invalid link format. Please request a new reset email.");
                }
            } else {
                // If there is no hash and no backend error, the link is broken
                const errorBox = document.getElementById('error-msg');
                if (!errorBox.innerText.includes('⚠️') || errorBox.innerText.trim() === '⚠️') {
                    showError("No authorization token found in URL. Please use the exact link from your email.");
                }
            }
        };

        function showError(msg) {
            const errorBox = document.getElementById('error-msg');
            errorBox.style.display = 'block';
            errorBox.innerText = "⚠️ " + msg;
            document.getElementById('action-btn').disabled = true;
            document.getElementById('action-btn').style.opacity = '0.5';
            document.getElementById('action-btn').style.cursor = 'not-allowed';
        }

        // Toggle Show/Hide Password
        function togglePassword(fieldId, iconElement) {
            const field = document.getElementById(fieldId);
            if (field.type === "password") {
                field.type = "text";
                iconElement.innerText = "🙈"; 
            } else {
                field.type = "password";
                iconElement.innerText = "👁️"; 
            }
        }

        // Prevent submission if passwords do not match
        document.getElementById('reset-form').addEventListener('submit', function(e) {
            const pass = document.getElementById('password').value;
            const conf = document.getElementById('confirm_password').value;
            
            if (pass !== conf) {
                e.preventDefault(); 
                const errorBox = document.getElementById('error-msg');
                errorBox.style.display = 'block';
                errorBox.innerText = "⚠️ Passwords do not match. Please try again.";
            }
        });
    </script>
</body>
</html>
