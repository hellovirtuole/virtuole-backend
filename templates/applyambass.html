<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apply for Ambassador | Virtuole</title>
    <style>
        /* Reuse the same CSS structure as your login.html for consistency */
        body { font-family: 'Inter', sans-serif; background: #030712; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px); padding: 40px; border-radius: 16px; width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.05); border-top: 4px solid #9f7aea; }
        h2 { font-family: 'Montserrat', sans-serif; margin-top: 0; color: #9f7aea; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85em; font-weight: 600; text-transform: uppercase; color: #9ca3af; }
        input, textarea { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #030712; color: white; }
        button { background: #9f7aea; color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Ambassador Application</h2>
        <form action="/api/apply-ambassador" method="POST">
            <div class="form-group"><label>Full Name</label><input type="text" name="name" required></div>
            <div class="form-group"><label>University Email</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Why do you want to lead?</label><textarea name="motivation" rows="4" required></textarea></div>
            <button type="submit">Submit Application</button>
        </form>
    </div>
</body>
</html>
